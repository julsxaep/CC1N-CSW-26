<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Aula Imagens</title>

    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <style>
        img.responsiva {
            width: 600px;
        }

        @media (max-width: 760px) {
            img.responsiva {
                width: 300px;
            }
        }
    </style>
</head>

<body>

    <h1>Desafio das Imagens</h1>

    <h2>Vila Velha - ES</h2>

    <img src="vilavelha.jpg" width="400">

    <br><br>

    <figure>
        <img src="convento.jpg" alt="Convento da Penha: Vila Velha - ES" width="400">
        <figcaption>Convento da Penha: Vila Velha - ES</figcaption>
    </figure>

    <br><br>

    <img src="paisagem.jpg" alt="Paisagem da cidade" class="responsiva">

</body>
</html>
